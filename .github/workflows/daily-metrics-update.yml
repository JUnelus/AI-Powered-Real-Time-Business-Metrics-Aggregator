name: Daily Metrics Update

on:
  push:
  workflow_dispatch:
  schedule:
    - cron: "0 13 * * *"

permissions:
  contents: write

jobs:
  update-readme:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Data quality preflight (schema drift + freshness)
        env:
          RAPIDAPI_KEY: ${{ secrets.RAPIDAPI_KEY }}
        run: python automation/generate_daily_report.py --check-only

      - name: Generate daily report and screenshots
        env:
          RAPIDAPI_KEY: ${{ secrets.RAPIDAPI_KEY }}
        run: python automation/generate_daily_report.py

      - name: Commit and push updates
        run: |
          if [[ -n "$(git status --porcelain README.md images/daily artifacts/daily_report.json artifacts/data_quality_report.json)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add README.md images/daily artifacts/daily_report.json artifacts/data_quality_report.json
            git commit -m "chore: daily metrics report update"
            git push
          else
            echo "No report changes to commit."
          fi

